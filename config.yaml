# RecurseForge Configuration
# ========================
# Tune these values for your hardware and task complexity.

llm:
  # llama.cpp server endpoint (OpenAI-compatible API)
  base_url: "http://localhost:8080/v1"
  # Model name passed in API requests (llama.cpp accepts any string)
  model_name: "qwen"
  # Expected llama.cpp context window. This is documentation/config intent;
  # the actual active context is set when starting llama-server with --ctx-size.
  context_window: 65536
  # Max tokens the model can generate per call. This is output budget, not the
  # full prompt window. Keep well below context_window to leave room for input.
  max_tokens: 8192
  # Lower = more deterministic, higher = more creative
  temperature: 0.3

context_governor:
  # Measure every prompt, cap named sections, and omit low-priority optional
  # context deterministically before inference.
  enabled: true
  context_window: 65536
  # This is a hard ceiling, not a target. Ordinary prompts should be smaller.
  max_prompt_tokens: 49152
  reserved_output_tokens: 8192
  safety_buffer_tokens: 8192
  sections:
    repo_map_tokens: 4096
    code_snippet_tokens: 16384
    parent_context_tokens: 4096
    sibling_result_tokens: 4096
    sandbox_error_tokens: 4096

result_frames:
  # Compact parent-facing payload. Full child responses remain in raw_result.
  max_tokens: 800
  max_summary_chars: 1800
  max_evidence: 6
  max_finding_chars: 500
  max_changes: 6
  max_risks: 4
  max_questions: 4
  max_item_chars: 400

recursion:
  # Maximum depth of recursive sub-agent spawning.
  # Depth 0 = root agent only. Depth 3 = root + 3 levels of children.
  # Keep this low on 8GB VRAM -- each level multiplies token cost.
  max_depth: 3
  # Maximum number of children any single agent can spawn per level.
  max_children: 4
  # Max retries per child when sandbox execution fails.
  # On failure, the error is sent back to the LLM to fix the code.
  max_retries: 2

context:
  # Target codebase directory for the repo-map server to index.
  # Set to "." to index the RecurseForge project itself for testing.
  target_dir: "."
  # Port for the repo-map FastAPI server.
  repo_map_port: 8001
  # Maximum tokens for the repository map overview (GET /map).
  # 65k-context mode can afford a richer map, but this should still stay
  # compact because every spawned agent receives it.
  max_map_tokens: 4096

vram:
  # VRAM warning threshold in MB (75% of 8GB).
  # At this level, L1 data is demoted to L2 (serialized to disk).
  warning_mb: 6500
  # VRAM critical threshold in MB (90% of 8GB).
  # At this level, oldest L0 context is forcefully evicted.
  critical_mb: 7000
  # How often the VRAM monitor polls GPU memory (seconds).
  poll_interval_s: 2.0

sandbox:
  # Max concurrent sandbox workers (reserved for future threading).
  pool_size: 4
  # Timeout per code execution (seconds).
  timeout_s: 30

textgrad:
  # Enable TextGrad structured gradient fixing.
  # When enabled, failed code goes through TextGrad's evaluate -> gradient -> fix
  # loop instead of the simple "here's the error, fix it" retry.
  # TextGrad uses 2 extra LLM calls per iteration (evaluator + updater).
  enabled: false
  # How many gradient iterations per failure (each = evaluate + fix).
  max_iterations: 1
  # Temperature for the evaluator LLM (low = precise critique).
  eval_temperature: 0.1
  # Temperature for the updater LLM (low = faithful to gradient).
  update_temperature: 0.2
